<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b132b" />
      <stop offset="100%" stop-color="#1c2541" />
    </linearGradient>

    <!-- V Shape Gradient -->
    <linearGradient id="vGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#003366" />
    </linearGradient>

    <!-- DNA Gradient -->
    <linearGradient id="dnaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#003366" />
    </linearGradient>

    <!-- Tentacle/Swoosh Gradient -->
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0e0e0" />
      <stop offset="30%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#80d0c7" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="3" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Optional Background (if not using transparent) -->
  <rect width="400" height="400" fill="transparent" rx="40" />

  <!-- The Right Arm of the V -->
  <path d="M 230 320 
           L 360 80 
           L 270 80 
           L 185 240 
           Z" 
        fill="url(#vGrad)" filter="url(#dropShadow)" />

  <!-- The Left Arm (DNA Base) -->
  <path d="M 60 80
           L 140 80
           L 140 120
           L 100 120
           L 100 280
           C 100 300 120 320 140 330
           L 140 360
           C 80 340 60 300 60 280
           Z"
        fill="url(#vGrad)" filter="url(#dropShadow)" />

  <!-- DNA Rungs in Left Arm -->
  <g fill="#00f2fe" opacity="0.8">
    <rect x="105" y="130" width="30" height="8" rx="4" />
    <rect x="110" y="150" width="38" height="8" rx="4" />
    <rect x="115" y="170" width="45" height="8" rx="4" />
    <rect x="118" y="190" width="48" height="8" rx="4" />
    <rect x="115" y="210" width="45" height="8" rx="4" />
    <rect x="110" y="230" width="38" height="8" rx="4" />
    <rect x="105" y="250" width="30" height="8" rx="4" />
  </g>

  <!-- The Swoosh / Tentacle wrapping around -->
  <path d="M 50 250 
           C 50 200, 160 160, 200 200 
           C 250 250, 310 280, 360 260
           C 340 290, 270 290, 220 240
           C 180 200, 90 220, 80 280
           Z" 
        fill="url(#swooshGrad)" filter="url(#dropShadow)" />

  <!-- Top Swoosh wrapping element -->
  <path d="M 120 180
           C 150 140, 220 150, 250 220
           C 210 170, 160 160, 140 200
           Z"
        fill="#e0e0e0" filter="url(#dropShadow)" />

  <!-- Glowing Cyan Nodes on the Swoosh -->
  <g fill="none" stroke="#00f2fe" stroke-width="4" filter="url(#glow)">
    <circle cx="150" cy="225" r="8" />
    <circle cx="205" cy="228" r="6" />
    <circle cx="280" cy="260" r="10" />
    <circle cx="320" cy="265" r="5" />
    <circle cx="110" cy="260" r="4" />
  </g>
  <g fill="#00f2fe">
    <circle cx="150" cy="225" r="4" />
    <circle cx="205" cy="228" r="3" />
    <circle cx="280" cy="260" r="5" />
    <circle cx="320" cy="265" r="2" />
    <circle cx="110" cy="260" r="2" />
  </g>
</svg>
